<!DOCTYPE html>
<html lang="es-ES">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página no encontrada — Lucas y Leo Digital</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="https://i.ibb.co/qMpJW9rj/7-removebg-preview.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--deep-space:#050505;--electric-blue:#00D1FF;--cyber-white:#F0F0F0;--copper-gold:#C87533;--warm-bronze:#8B4513;--font-display:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font-body);background:var(--deep-space);color:var(--cyber-white);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
.wrap{max-width:520px;}
.code{font-family:var(--font-display);font-size:clamp(80px,20vw,140px);font-weight:800;line-height:1;background:linear-gradient(135deg,var(--copper-gold),var(--warm-bronze));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px;}
h1{font-family:var(--font-display);font-size:clamp(22px,4vw,32px);font-weight:700;margin-bottom:14px;}
p{font-size:16px;opacity:.65;line-height:1.7;margin-bottom:32px;}
.links{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.links a{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:50px;font-family:var(--font-display);font-size:14px;font-weight:700;text-decoration:none;text-transform:uppercase;letter-spacing:.05em;transition:transform .2s,box-shadow .2s;}
.btn-home{background:linear-gradient(135deg,var(--electric-blue),#0088BB);color:#050505;box-shadow:0 8px 28px rgba(0,209,255,.3);}
.btn-home:hover{transform:translateY(-2px);box-shadow:0 14px 40px rgba(0,209,255,.5);}
.btn-ag{border:2px solid var(--copper-gold);background:rgba(200,117,51,.08);color:var(--copper-gold);}
.btn-ag:hover{background:var(--copper-gold);color:#050505;transform:translateY(-2px);}
</style>
</head>
<body>
<div class="wrap">
<div class="code">404</div>
<h1>Esta pagina no existe</h1>
<p>Puede que el enlace este roto o que la pagina haya sido movida. Vuelve al inicio o visita nuestra agencia.</p>
<div class="links">
<a href="/" class="btn-home">Ir al inicio</a>
<a href="/agencia/" class="btn-ag">Ver la agencia</a>
</div>
</div>
</body>
</html>
